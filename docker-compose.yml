services:
  # PostgreSQL Database with pgvector
  postgres:
    image: ankane/pgvector:latest
    container_name: jarv-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jarv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jarv_password}
      POSTGRES_DB: ${POSTGRES_DB:-jarv}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jarv}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jarv-network

  # Redis for caching and job queue
  redis:
    image: redis:7-alpine
    container_name: jarv-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jarv-network

  # FastAPI Backend
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: jarv-backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jarv}:${POSTGRES_PASSWORD:-jarv_password}@postgres:5432/${POSTGRES_DB:-jarv}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      # LLM provider keys are read from the mounted apps/backend/.env. Do not
      # set them here with empty defaults — an empty env var would take
      # precedence over the .env file and blank out the configured key.
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Real read-only workspace inspection. WORKSPACE_HOST_ROOT is the host path
      # operators type in commands; it is bind-mounted read-only at the container
      # path below. JARV only inspects approved workspaces inside this root.
      WORKSPACE_HOST_ROOT: ${WORKSPACE_HOST_ROOT:-C:\\Users\\lilri\\OneDrive\\Desktop}
      WORKSPACE_CONTAINER_ROOT: /host/workspaces
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
      # Approved workspace root, mounted READ-ONLY for real file inspection.
      - ${WORKSPACE_HOST_ROOT:-C:/Users/lilri/OneDrive/Desktop}:/host/workspaces:ro
    networks:
      - jarv-network
    restart: unless-stopped

  # Next.js Dashboard Frontend
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: jarv-dashboard
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - jarv-network
    restart: unless-stopped
    # Liveness only: probe the dashboard's own static root, not /api/health
    # (which proxies the backend). Use 127.0.0.1 to avoid IPv6 localhost races.
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Celery Worker
  worker:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: jarv-worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jarv}:${POSTGRES_PASSWORD:-jarv_password}@postgres:5432/${POSTGRES_DB:-jarv}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
    networks:
      - jarv-network
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4
    # Celery worker liveness: ping the worker over the broker (not HTTP — this
    # container runs Celery, not the uvicorn server the base image probes).
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Celery Beat Scheduler
  scheduler:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: jarv-scheduler
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jarv}:${POSTGRES_PASSWORD:-jarv_password}@postgres:5432/${POSTGRES_DB:-jarv}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/backend:/app
    networks:
      - jarv-network
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info
    # Celery beat liveness: beat does not answer `inspect ping`, so verify the
    # beat process itself is running (not HTTP — the base image probes uvicorn).
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0 if b'beat' in open('/proc/1/cmdline','rb').read() else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Local Runner Service (optional, for local development)
  local-runner:
    build:
      context: ./services/local-runner
      dockerfile: Dockerfile
    container_name: jarv-local-runner
    environment:
      BACKEND_URL: http://backend:8000
      RUNNER_TOKEN: ${RUNNER_TOKEN:-dev-runner-token}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8001:8001"
    depends_on:
      - backend
    volumes:
      - ./services/local-runner:/app
      # Mount approved folders for local file access (configure as needed)
      # - /path/to/approved/folder:/workspaces
    networks:
      - jarv-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  jarv-network:
    driver: bridge
